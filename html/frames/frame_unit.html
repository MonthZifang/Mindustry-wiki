                  html框架，对item介绍提供支持 
                  禁止乱动，否则会导致网站错误！
=============================================================== -->


<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>Mindustry Wiki</title>
  <link rel="Mindustry Wiki" href="/src/image/icon.png" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/item.css" />

</head>

<body>
  <app-header></app-header>
  <!-- 固定右侧目录 -->
  <aside class="toc">
    <aside class="toc-fixed">
      <strong>目录</strong>
      <ul>
        <li><a href="#行为">1. 行为</a></li>
        <li><a href="#物品列表">2. 物品列表</a></li>
        <li><a href="#单位">3. 单位</a></li>
        <li><a href="#参考">4. 参考</a></li>
      </ul>
    </aside>
  </aside>
  <div class="describe_box">
    <div class="item_box">
      <div class="image-text-container">
        <img src="/src/datas/unit/Alpha.png" alt="Antumbra" class="item_img">
        <h1 id="name">阿尔法</h1>
      </div>

      <hr style="border-top: 2px solid rgb(0, 0, 0); margin: 10px 0;">

      <table border="1">
        <colgroup>
          <col style="width: 125px"> <!-- 第一列 -->
          <col style="width: calc(100%-125px)">
        </colgroup>
        <theaad>
          <tr>
            <th>属性</th>
            <th>值</th>
          </tr>
          <tr>
            <td class="table1">类别</td>
            <td class="table1_" id="type">单位</td>
          </tr>
          <tr>
            <td class="table2">生命值</td>
            <td class="table2_" id="health">150</td>
          </tr>
          <tr>
            <td class="table3">护甲</td>
            <td class="table3_" id="armor">0</td>
          </tr>
          <tr>
            <td class="table1">尺寸</td>
            <td class="table1_" id="size">1 × 1</td>
          </tr>
          <tr>
            <td class="table2">空中单位</td>
            <td class="table2_" id="fly">是</td>
          </tr>
          <tr>
            <td class="table3">移动速度（格/秒）</td>
            <td class="table3_" id="speed">22.5</td>
          </tr>
          <tr>
            <td class="table1">建造速度（%）</td>
            <td class="table1_" id="build_speed">50</td>
          </tr>
          <tr>
            <td class="table2">采矿速度（%）</td>
            <td class="table2_" id="mining_speed">650</td>
          </tr>
          <tr>
            <td class="table3">可采集矿物</td>
            <td class="table3_" id="collectable_minerals">铜 铅 废料</td>
          </tr>
          <tr>
            <td class="table1">物品容量（个）</td>
            <td class="table1_" id="item_capacity">30</td>
          </tr>
          <tr>
            <td class="table2">武器</td>
            <td class="table2_" id="weapons">
              开火速率：2 × 1.76 / 秒<br>
              伤害：11<br>
              -99.0% 对建筑伤害
            </td>
          </tr>
          <tr>
            <td class="table3">攻击范围（格）</td>
            <td class="table3_" id="range">18.2</td>
          </tr>
          <tr>
            <td class="table3">攻击空中单位</td>
            <td class="table3_" id="airborne_unit">是</td>
          </tr>
          <tr>
            <td class="table3">攻击地面单位</td>
            <td class="table3_" id="ground_unit">是</td>
          </tr>
        </theaad>
      </table>
    </div>
    <div class="output" id="output"></div>


  </div>



  <script src="/js/item.js"></script>
  <script src="/js/script.js"></script>
  <script src="/js/marked.js"></script>
  <script>

  </script>

</body>

</html>
